# Evaluation suite for AI agents and skills
# One test per agent/skill; each test uses subtests (multiple assertions) to validate behavior.

prompts:
  - "{{task}}"

providers:
  - id: 'exec: bash providers/claude_code.sh'
    label: claude-code

defaultTest:
  options:
    provider: 'exec: bash providers/grader.sh'
    rubricPrompt: file://graders/judge-prompt.txt
  assert:
    - type: latency
      threshold: 30000
    - type: javascript
      value: |
        const words = output.split(/\s+/).filter(w => w.length > 0).length;
        const score = Math.max(0, 1 - (words / 700));
        return { pass: true, score, reason: `${words} words → cost score ${score.toFixed(2)}` };
      metric: cost
      weight: 1


tests:
  # ── code-reviewer agent ──────────────────────────────────────────────────────
  - description: 'code-reviewer — BLOCK verdict, CWE citations, completeness, rubric'
    options:
      provider: 'exec: bash providers/code_reviewer.sh'
      repeat: 3
    vars:
      task: |
        Review this code for issues:
        ```javascript
        const express = require('express');
        const app = express();

        app.post('/webhook', express.text(), (req, res) => {
          const payload = eval('(' + req.body + ')');
          const action = payload.action;
          if (action === 'deploy') {
            exec(`deploy.sh ${payload.target}`);
          }
          res.json({ status: 'processed' });
        });
        ```
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasBlock = lower.includes('block');
          return { pass: hasBlock, score: hasBlock ? 1 : 0, reason: `Verdict BLOCK: ${hasBlock}` };
        metric: accuracy
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasEvalFinding = lower.includes('eval') && (lower.includes('injection') || lower.includes('cwe') || lower.includes('deserializ'));
          const hasCommandInjection = lower.includes('command injection') || lower.includes('cwe-78') || lower.includes('exec');
          const score = [hasEvalFinding, hasCommandInjection].filter(Boolean).length / 2;
          return { pass: hasEvalFinding, score, reason: `Eval finding: ${hasEvalFinding}, Command injection: ${hasCommandInjection}` };
        metric: completeness
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasCwe = /cwe-\d+/.test(lower);
          const hasSeverity = lower.includes('must_fix') || lower.includes('critical') || lower.includes('high');
          const hasEvidence = lower.includes('eval(') || lower.includes('exec(');
          const score = [hasCwe, hasSeverity, hasEvidence].filter(Boolean).length / 3;
          return { pass: hasCwe && hasEvidence, score, reason: `CWE cited: ${hasCwe}, Severity: ${hasSeverity}, Evidence: ${hasEvidence}` };
        metric: structured_output
        weight: 2
      - type: llm-rubric
        threshold: 0.8
        value: |
          Score 1–5 (divide by 5 for final score):
          1 = APPROVEs the code or misses the eval() danger entirely
          2 = Notes eval() is dangerous but no BLOCK verdict and no concrete fix
          3 = Issues BLOCK verdict for eval() but misses exec() command injection
          4 = Issues BLOCK verdict, identifies both eval() and exec() with evidence, suggests fixes
          5 = Issues BLOCK, identifies eval() (CWE-94) and exec() (CWE-78) with quoted evidence and concrete fixes (JSON.parse, parameterize exec)
          A review that APPROVEs this code or misses the eval() danger is WRONG (score 1).
        metric: rubric_quality
        weight: 3

  # ── team-lead agent ──────────────────────────────────────────────────────────
  - description: 'team-lead — trivial task handled directly without delegation'
    options:
      provider: 'exec: bash providers/team_lead.sh'
      repeat: 3
    vars:
      task: 'Rename the variable `x` to `count` in this snippet and return the corrected code: `const x = items.length;`'
    assert:
      - type: icontains
        value: 'count'
        metric: accuracy
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const delegated = lower.includes('delegating to builder') || lower.includes('dispatching to') || lower.includes('subagent') || lower.includes('worktree');
          const hasCode = lower.includes('const count') || lower.includes('count =');
          const concise = output.split(/\s+/).length < 100;
          let score = 1.0;
          if (delegated) score -= 0.6;
          if (!hasCode) score -= 0.2;
          if (!concise) score -= 0.1;
          score = Math.max(0, score);
          return { pass: !delegated, score, reason: `Delegated: ${delegated}, Has code: ${hasCode}, Concise: ${concise}` };
        metric: directness
        weight: 3
      - type: llm-rubric
        threshold: 0.8
        value: |
          Score 1–5 (divide by 5 for final score):
          1 = Delegates to subagent or creates a worktree for this trivial rename
          2 = Produces a multi-step plan instead of inline code
          3 = Returns corrected code but with excessive explanation or preamble
          4 = Returns corrected code inline with brief note; concise
          5 = Returns corrected code immediately with no unnecessary preamble or delegation
          A response that says "delegating to builder" or "creating worktree" for a one-line rename is WRONG (score 1).
        metric: efficiency
        weight: 2

  - description: 'team-lead — complex task delegates and produces Valkey batch pipeline program'
    options:
      provider: 'exec: bash providers/team_lead.sh'
      repeat: 3
    vars:
      task: |
        Create a small Node.js program (single file, ~30-50 lines) that connects to Valkey
        at localhost:6379, stores 100 key-value pairs through pipelining/batching (not one-by-one),
        then reads them back in a batch and prints the count. Return the complete program code.
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasValkey = lower.includes('valkey') || lower.includes('glide');
          const hasConnect = lower.includes('6379') || lower.includes('localhost');
          const score = [hasValkey, hasConnect].filter(Boolean).length / 2;
          return { pass: hasValkey && hasConnect, score, reason: `Valkey ref: ${hasValkey}, Connection: ${hasConnect}` };
        metric: accuracy
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasGlide = lower.includes('valkey-glide') || lower.includes('@valkey/valkey-glide') || lower.includes('glide');
          const usesWrongClient = lower.includes('iovalkey') || lower.includes('ioredis') || lower.includes('node-redis');
          const score = hasGlide && !usesWrongClient ? 1 : hasGlide ? 0.5 : 0;
          return { pass: hasGlide && !usesWrongClient, score, reason: `Uses valkey-glide: ${hasGlide}, Wrong client: ${usesWrongClient}` };
        metric: client_compliance
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasPipeline = lower.includes('pipeline') || lower.includes('batch') || lower.includes('multi');
          const hasLoop = lower.includes('for') || lower.includes('map') || lower.includes('foreach');
          const hasExec = lower.includes('.exec') || lower.includes('.run');
          const score = [hasPipeline, hasLoop, hasExec].filter(Boolean).length / 3;
          return { pass: hasPipeline, score, reason: `Pipeline/batch: ${hasPipeline}, Loop: ${hasLoop}, Exec: ${hasExec}` };
        metric: batching
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const delegated = lower.includes('builder') || lower.includes('delegat') || lower.includes('subagent') || lower.includes('implement');
          const hasCode = output.includes('require(') || output.includes('import ') || output.includes('const ') || output.includes('async ');
          const score = [delegated, hasCode].filter(Boolean).length / 2;
          return { pass: hasCode, score, reason: `Delegated: ${delegated}, Produced code: ${hasCode}` };
        metric: completeness
        weight: 2
      - type: llm-rubric
        threshold: 0.8
        value: |
          Score 1–5 (divide by 5 for final score):
          1 = Uses wrong client (ioredis/iovalkey/node-redis) or writes keys one-by-one
          2 = Uses valkey-glide but no pipelining/batching
          3 = Uses valkey-glide with pipelining but missing read-back or count output
          4 = Complete program with valkey-glide, pipelining for writes and reads, prints count; minor issues
          5 = Complete, correct program: valkey-glide, pipeline writes 100 keys, pipeline reads them back, prints count, handles connection errors
          WRONG if: uses ioredis, iovalkey, or node-redis; writes keys one-by-one with individual awaited set() calls.
        metric: rubric_quality
        weight: 3

  - description: 'team-lead — multi-file feature produces delegation plan, not inline code'
    options:
      provider: 'exec: bash providers/team_lead.sh'
      repeat: 2
    vars:
      task: |
        Add a rate-limiting middleware to our Express API that tracks request counts per IP
        in Valkey. This requires changes to middleware/rateLimit.ts, config/valkey.ts, and
        updates to app.ts to wire it in. Implement the full feature.
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasPlan = lower.includes('plan') || lower.includes('step') || lower.includes('subagent') || lower.includes('builder') || lower.includes('delegat') || lower.includes('implement');
          const isFullInline = (output.match(/function|const |async |export /g) || []).length > 10;
          const score = hasPlan ? (isFullInline ? 0.5 : 1.0) : 0.2;
          return { pass: hasPlan && !isFullInline, score, reason: `Has plan/delegation: ${hasPlan}, Is full inline impl: ${isFullInline}` };
        metric: directness
        weight: 3
      - type: llm-rubric
        threshold: 0.8
        value: |
          Score 1–5 (divide by 5 for final score):
          1 = Does nothing or produces an unrelated response
          2 = Produces full inline implementation across all three files without any planning
          3 = Mentions the files needed but does not delegate or produce a structured plan
          4 = Produces a plan referencing subagent or builder for implementation; does not inline all code
          5 = Produces a clear delegation plan naming the files, referencing subagent/builder execution, and explicitly not inlining the full implementation
        metric: rubric_quality
        weight: 3
      - type: javascript
        value: |
          const words = output.split(/\s+/).filter(w => w.length > 0).length;
          const score = words <= 300 ? 1.0 : Math.max(0, 1 - (words - 300) / 700);
          return { pass: true, score, reason: `${words} words (ceiling 300)` };
        metric: cost
        weight: 1

  # ── researcher agent ─────────────────────────────────────────────────────────
  - description: 'researcher — technical question with source citation and recommendation'
    options:
      provider: 'exec: bash providers/stubs/researcher_stub.sh'
      repeat: 2
    vars:
      task: 'How do I connect to Valkey from Node.js and what client library should I use?'
    assert:
      - type: llm-rubric
        threshold: 0.8
        value: |
          Score 1–5 (divide by 5 for final score):
          1 = No answer or completely off-topic
          2 = Vague or generic answer with no library recommendation or source
          3 = Correct answer (valkey-glide) but no source URL or citation
          4 = Correct answer with a source URL or citation present
          5 = Correct answer naming valkey-glide, source URL present, and a concrete code example or recommendation
        metric: rubric_quality
        weight: 3
      - type: icontains
        value: 'valkey-glide'
        metric: accuracy
        weight: 3
      - type: javascript
        value: |
          const words = output.split(/\s+/).filter(w => w.length > 0).length;
          const score = words <= 300 ? 1.0 : Math.max(0, 1 - (words - 300) / 500);
          return { pass: true, score, reason: `${words} words (ceiling 300)` };
        metric: cost
        weight: 1

  # ── review-code skill ────────────────────────────────────────────────────────
  - description: 'review-code skill — identifies SQL injection with evidence and fix'
    options:
      provider: 'exec: bash providers/claude_code.sh'
      repeat: 2
    vars:
      task: |
        /review-code
        Review this code for security issues:
        ```javascript
        function getUser(db, userId) {
          return db.query("SELECT * FROM users WHERE id = '" + userId + "'");
        }
        ```
    assert:
      - type: icontains
        value: 'injection'
        metric: accuracy
        weight: 3
      - type: llm-rubric
        threshold: 0.8
        value: |
          Score 1–5 (divide by 5 for final score):
          1 = No finding identified
          2 = Vague finding mentioned without quoting the vulnerable line or explaining the risk
          3 = SQL injection identified but no fix suggested
          4 = SQL injection identified, offending line quoted as evidence, fix suggested (parameterized query)
          5 = SQL injection identified with evidence, CWE or severity level stated, parameterized query fix provided
        metric: rubric_quality
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasFix = lower.includes('parameterized') || lower.includes('prepared') || lower.includes('placeholder') || lower.includes('?');
          const hasEvidence = lower.includes("userid") || lower.includes("'") || lower.includes('"');
          const score = [hasFix, hasEvidence].filter(Boolean).length / 2;
          return { pass: hasFix, score, reason: `Has fix: ${hasFix}, Has evidence: ${hasEvidence}` };
        metric: completeness
        weight: 2
      - type: javascript
        value: |
          const words = output.split(/\s+/).filter(w => w.length > 0).length;
          const score = words <= 300 ? 1.0 : Math.max(0, 1 - (words - 300) / 500);
          return { pass: true, score, reason: `${words} words (ceiling 300)` };
        metric: cost
        weight: 1

  - description: 'review-code skill — no false MUST_FIX on clean well-written code'
    options:
      provider: 'exec: bash providers/claude_code.sh'
      repeat: 2
    vars:
      task: |
        /review-code
        Review this code:
        ```typescript
        function clamp(value: number, min: number, max: number): number {
          if (min > max) throw new Error(`min (${min}) must be <= max (${max})`);
          return Math.min(Math.max(value, min), max);
        }
        ```
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasFalseCritical = lower.includes('must_fix') || lower.includes('block') || (lower.includes('critical') && !lower.includes('no critical'));
          const score = hasFalseCritical ? 0 : 1;
          return { pass: !hasFalseCritical, score, reason: `False critical finding: ${hasFalseCritical}` };
        metric: accuracy
        weight: 3
      - type: llm-rubric
        threshold: 0.8
        value: |
          Score 1–5 (divide by 5 for final score):
          1 = Issues a false BLOCK or MUST_FIX finding
          2 = Issues a false high-severity finding with poor justification
          3 = No false critical finding but fails to acknowledge the code quality
          4 = Correctly identifies no critical issues; acknowledges clean logic or states only nits
          5 = Accurately identifies the code as correct; notes the guard clause and Math.min/max usage; any suggestions are nit-level only
        metric: rubric_quality
        weight: 3
      - type: javascript
        value: |
          const words = output.split(/\s+/).filter(w => w.length > 0).length;
          const score = words <= 200 ? 1.0 : Math.max(0, 1 - (words - 200) / 400);
          return { pass: true, score, reason: `${words} words (ceiling 200)` };
        metric: cost
        weight: 1

  # ── review-pr skill ──────────────────────────────────────────────────────────
  - description: 'review-pr skill — blocking findings with file refs, no GitHub writes'
    options:
      provider: 'exec: bash providers/claude_code.sh'
    vars:
      task: '/review-pr edlng/agents#1'
    assert:
      - type: icontains
        value: '## Blocking'
        metric: accuracy
        weight: 3
      - type: javascript
        value: |
          const hasBlocking = output.includes('## Blocking');
          const hasFile = /\.(ts|js|py|go|java|sh|yaml|json)/.test(output);
          const hasLineRange = /L\d+|line \d+|\d+:\d+/.test(output);
          const score = [hasBlocking, hasFile, hasLineRange].filter(Boolean).length / 3;
          return { pass: hasBlocking, score, reason: `Has Blocking section: ${hasBlocking}, Has file ref: ${hasFile}, Has line range: ${hasLineRange}` };
        metric: completeness
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasWrite = lower.includes('gh pr review') || lower.includes('gh pr comment') || lower.includes('posted to github') || lower.includes('comment posted');
          return { pass: !hasWrite, score: hasWrite ? 0 : 1, reason: `Contains GitHub write: ${hasWrite}` };
        metric: safety
        weight: 3
      - type: javascript
        value: |
          const words = output.split(/\s+/).filter(w => w.length > 0).length;
          const score = words <= 500 ? 1.0 : Math.max(0, 1 - (words - 500) / 1000);
          return { pass: true, score, reason: `${words} words (ceiling 500)` };
        metric: cost
        weight: 1

  # ── write-pr skill ───────────────────────────────────────────────────────────
  - description: 'write-pr skill — template sections filled, no AI vocabulary'
    options:
      provider: 'exec: bash providers/claude_code.sh'
    vars:
      task: '/write-pr HEAD~1'
    assert:
      - type: javascript
        value: |
          const hasSummary = /##\s*summary/i.test(output) && output.split(/##\s*summary/i)[1]?.trim().length > 10;
          const hasChanges = /##\s*(changes|what changed)/i.test(output);
          const hasTests = /##\s*(test|testing)/i.test(output);
          const score = [hasSummary, hasChanges, hasTests].filter(Boolean).length / 3;
          return { pass: hasSummary && hasChanges, score, reason: `Summary: ${hasSummary}, Changes: ${hasChanges}, Tests: ${hasTests}` };
        metric: completeness
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const aiWords = ['streamlines', 'robust', 'enhance', 'leverage', 'crucial', 'pivotal'];
          const found = aiWords.filter(w => lower.includes(w));
          const score = found.length === 0 ? 1 : Math.max(0, 1 - found.length * 0.25);
          return { pass: found.length === 0, score, reason: `AI vocab found: ${found.join(', ') || 'none'}` };
        metric: accuracy
        weight: 3
      - type: llm-rubric
        threshold: 0.8
        value: |
          Score 1–5 (divide by 5 for final score):
          1 = Clearly AI-generated: multiple marketing/AI vocabulary words, stiff passive constructions
          2 = 1–2 AI vocabulary markers present (streamlines, robust, enhance, leverage, crucial, pivotal)
          3 = Neutral but stiff — no glaring AI markers but reads like a template
          4 = Natural with minor stiffness; reads like a developer wrote it with minor polish needed
          5 = Reads exactly like a developer wrote it — concrete, direct, no AI markers, matches the diff accurately
        metric: rubric_quality
        weight: 3
      - type: javascript
        value: |
          const words = output.split(/\s+/).filter(w => w.length > 0).length;
          const score = words <= 300 ? 1.0 : Math.max(0, 1 - (words - 300) / 600);
          return { pass: true, score, reason: `${words} words (ceiling 300)` };
        metric: cost
        weight: 1

  # ── multi-discipline-review skill ────────────────────────────────────────────
  - description: 'multi-discipline-review skill — covers 3+ disciplines on bank-transfer code'
    options:
      provider: 'exec: bash providers/claude_code.sh'
    vars:
      task: |
        /multi-discipline-review
        Review this code:
        ```javascript
        app.post('/transfer', (req, res) => {
          const { from, to, amount } = req.body;
          const fromBalance = db.query(`SELECT balance FROM accounts WHERE id = '${from}'`);
          if (fromBalance >= amount) {
            db.query(`UPDATE accounts SET balance = balance - ${amount} WHERE id = '${from}'`);
            db.query(`UPDATE accounts SET balance = balance + ${amount} WHERE id = '${to}'`);
          }
          res.json({ success: true });
        });
        ```
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const disciplines = {
            security: lower.includes('security') || lower.includes('injection') || lower.includes('sql'),
            correctness: lower.includes('correctness') || lower.includes('transaction') || lower.includes('atomic') || lower.includes('race'),
            design: lower.includes('design') || lower.includes('error handling') || lower.includes('rollback'),
            performance: lower.includes('performance') || lower.includes('index') || lower.includes('query'),
            testing: lower.includes('testing') || lower.includes('test coverage') || lower.includes('unit test')
          };
          const found = Object.entries(disciplines).filter(([, v]) => v).map(([k]) => k);
          const score = Math.min(found.length / 3, 1);
          return { pass: found.length >= 3, score, reason: `Disciplines found: ${found.join(', ')} (${found.length}/5)` };
        metric: completeness
        weight: 3
      - type: javascript
        value: |
          const words = output.split(/\s+/).filter(w => w.length > 0).length;
          const score = words <= 500 ? 1.0 : Math.max(0, 1 - (words - 500) / 1000);
          return { pass: true, score, reason: `${words} words (ceiling 500)` };
        metric: cost
        weight: 1

assertScoringFunction: file://scoring.js
