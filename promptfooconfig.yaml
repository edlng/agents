# Agent unit test suite.
# Each test targets one non-orchestrator agent with a focused single-turn prompt.
# Assertions are grounded in each agent's documented behavioral rules.
# Token costs are tracked via evals/providers/agent.sh and summarized by evals/scripts/cost-summary.js.
#
# Run all tests:      make eval
# Run one agent:      make eval-agent AGENT=code-reviewer
# View results:       make eval-view
# Print cost summary: make eval-cost

prompts:
  - "{{task}}"

# Single dispatcher provider. Each test passes vars.agent; agent.sh reads it from context JSON.
providers:
  - id: 'exec: bash evals/providers/agent.sh placeholder'
    label: agent

defaultTest:
  options:
    provider: 'exec: bash evals/providers/grader.sh'
    rubricPrompt: file://evals/graders/judge-prompt.txt

assertScoringFunction: file://evals/scoring.js

tests:

  # ── code-reviewer ────────────────────────────────────────────────────────────
  - description: 'code-reviewer — BLOCK verdict with CWE citations on eval/exec injection'
    vars:
      agent: code-reviewer
      task: |
        Review this code for issues:
        ```javascript
        const express = require('express');
        const app = express();

        app.post('/webhook', express.text(), (req, res) => {
          const payload = eval('(' + req.body + ')');
          const action = payload.action;
          if (action === 'deploy') {
            exec(`deploy.sh ${payload.target}`);
          }
          res.json({ status: 'processed' });
        });
        ```
    assert:
      - type: javascript
        value: |
          return { pass: output.toLowerCase().includes('block'), score: output.toLowerCase().includes('block') ? 1 : 0, reason: `BLOCK verdict: ${output.toLowerCase().includes('block')}` };
        metric: accuracy
        weight: 4
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasCwe94 = lower.includes('cwe-94') || (lower.includes('eval') && (lower.includes('injection') || lower.includes('cwe')));
          const hasCwe78 = lower.includes('cwe-78') || lower.includes('command injection') || (lower.includes('exec') && lower.includes('cwe'));
          const score = [hasCwe94, hasCwe78].filter(Boolean).length / 2;
          return { pass: hasCwe94 && hasCwe78, score, reason: `CWE-94(eval): ${hasCwe94}, CWE-78(exec): ${hasCwe78}` };
        metric: cwe_coverage
        weight: 3
      - type: javascript
        value: |
          const hasEvalQuoted = output.includes('eval(');
          const hasExecQuoted = output.includes('exec(') || output.includes('exec(`');
          const score = [hasEvalQuoted, hasExecQuoted].filter(Boolean).length / 2;
          return { pass: hasEvalQuoted, score, reason: `Evidence quoted — eval(: ${hasEvalQuoted}, exec(: ${hasExecQuoted}` };
        metric: evidence
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const fix = lower.includes('json.parse') || lower.includes('parameteriz') || lower.includes('sanitize') || lower.includes('whitelist');
          return { pass: fix, score: fix ? 1 : 0, reason: `Fix suggested (JSON.parse/parameterize): ${fix}` };
        metric: fix_suggested
        weight: 2
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = APPROVEs the code or misses eval() danger entirely
          2 = Notes eval() is dangerous but no BLOCK verdict, no concrete fix
          3 = Issues BLOCK for eval() but misses exec() command injection
          4 = Issues BLOCK, identifies both eval() and exec() with evidence, suggests fixes
          5 = Issues BLOCK, cites CWE-94 and CWE-78 with quoted evidence, suggests JSON.parse and parameterized exec
          A review that APPROVEs this code is WRONG (score 1).
        metric: rubric_quality
        weight: 3

  - description: 'code-reviewer — APPROVE clean code, no false positives'
    vars:
      agent: code-reviewer
      task: |
        Review this code:
        ```typescript
        function clamp(value: number, min: number, max: number): number {
          if (min > max) throw new Error(`min (${min}) must be <= max (${max})`);
          return Math.min(Math.max(value, min), max);
        }
        ```
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const falseBlock = lower.includes('block') && !lower.includes('no block') && !lower.includes('approve');
          const falseMustFix = lower.includes('must_fix') || lower.includes('must fix');
          const pass = !falseBlock && !falseMustFix;
          return { pass, score: pass ? 1 : 0, reason: `False BLOCK: ${falseBlock}, False MUST_FIX: ${falseMustFix}` };
        metric: accuracy
        weight: 4
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasApprove = lower.includes('approve') || lower.includes('no critical') || lower.includes('no issue') || lower.includes('looks good');
          return { pass: hasApprove, score: hasApprove ? 1 : 0, reason: `APPROVE or equivalent: ${hasApprove}` };
        metric: correct_verdict
        weight: 3
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = Issues a false BLOCK or MUST_FIX
          2 = Issues a false high-severity finding
          3 = No false critical, but doesn't acknowledge code quality
          4 = Correctly identifies no critical issues; only nit-level suggestions at most
          5 = Accurately assesses the code as correct; any suggestions are nit-only
        metric: rubric_quality
        weight: 3

  # ── builder ──────────────────────────────────────────────────────────────────
  - description: 'builder — outputs PLAN block then working implementation, no delegation'
    vars:
      agent: builder
      task: |
        Implement a function `clamp(value, min_val, max_val)` in Python that returns
        value clamped to [min_val, max_val]. Raise ValueError if min_val > max_val.
    assert:
      - type: javascript
        value: |
          const hasPlan = output.includes('PLAN:') || output.includes('## Plan') || output.includes('**Plan**');
          return { pass: hasPlan, score: hasPlan ? 1 : 0, reason: `PLAN block present: ${hasPlan}` };
        metric: plan_present
        weight: 3
      - type: javascript
        value: |
          const hasCode = output.includes('def clamp') || output.includes('def clamp(');
          return { pass: hasCode, score: hasCode ? 1 : 0, reason: `Function implementation: ${hasCode}` };
        metric: code_produced
        weight: 4
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasDone = lower.includes('done') || lower.includes('status: done') || lower.includes('**done**');
          return { pass: hasDone, score: hasDone ? 1 : 0, reason: `DONE status reported: ${hasDone}` };
        metric: done_status
        weight: 2
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const delegated = lower.includes('spawning') || lower.includes('subagent') || (lower.includes('delegat') && !lower.includes('not delegat'));
          return { pass: !delegated, score: delegated ? 0 : 1, reason: `Incorrectly delegated: ${delegated}` };
        metric: no_delegation
        weight: 3
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = No code, or delegates to another agent
          2 = Has code but no PLAN section, or misses ValueError on invalid range
          3 = Has PLAN and code but incomplete (missing error case or edge cases)
          4 = PLAN block + working clamp implementation + ValueError for invalid range
          5 = PLAN block + complete implementation + status report (DONE) + handles edge cases
        metric: rubric_quality
        weight: 3

  # ── validator ────────────────────────────────────────────────────────────────
  - description: 'validator — FAIL verdict on incomplete implementation, scored dimensions'
    vars:
      agent: validator
      task: |
        Verify this implementation against the acceptance criteria.

        Task: Implement divide(a, b) that returns a/b and raises ValueError when b is 0.

        Code:
        ```python
        def divide(a, b):
            return a / b
        ```

        Acceptance criteria:
        1. Returns correct result for valid inputs (e.g. divide(10, 2) == 5.0)
        2. Raises ValueError when b is 0
    assert:
      - type: javascript
        value: |
          const hasFail = output.includes('FAIL') || output.includes('Status: FAIL');
          return { pass: hasFail, score: hasFail ? 1 : 0, reason: `FAIL verdict: ${hasFail}` };
        metric: correct_verdict
        weight: 4
      - type: javascript
        value: |
          const hasStatus = /status:\s*(pass|fail)/i.test(output);
          return { pass: hasStatus, score: hasStatus ? 1 : 0, reason: `Status line present: ${hasStatus}` };
        metric: structured_output
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasValueError = lower.includes('valueerror') || lower.includes('raises') || lower.includes('criteria 2') || lower.includes('missing');
          return { pass: hasValueError, score: hasValueError ? 1 : 0, reason: `Missing ValueError criterion called out: ${hasValueError}` };
        metric: finding_accuracy
        weight: 3
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = Issues PASS or misses the missing ValueError entirely
          2 = Notes the issue but no structured PASS/FAIL verdict
          3 = FAIL verdict but no score breakdown or missing evidence
          4 = FAIL verdict with explanation of what's missing; structured output
          5 = FAIL verdict, identifies criteria 2 as unmet with evidence, includes dimension scores
        metric: rubric_quality
        weight: 3

  # ── researcher ───────────────────────────────────────────────────────────────
  - description: 'researcher — citable valkey-glide recommendation with source URL (stub)'
    vars:
      agent: researcher
      task: 'How do I connect to Valkey from Node.js and what client library should I use?'
    assert:
      - type: icontains
        value: 'valkey-glide'
        metric: accuracy
        weight: 4
      - type: javascript
        value: |
          const hasUrl = /https?:\/\//.test(output);
          return { pass: hasUrl, score: hasUrl ? 1 : 0, reason: `Source URL present: ${hasUrl}` };
        metric: citation
        weight: 4
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasRecommendation = lower.includes('recommendation') || lower.includes('recommend') || lower.includes('suggest');
          return { pass: hasRecommendation, score: hasRecommendation ? 1 : 0, reason: `Recommendation section: ${hasRecommendation}` };
        metric: recommendation
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const noSource = lower.includes('no reliable source');
          return { pass: !noSource, score: noSource ? 0 : 1, reason: `False no-source claim: ${noSource}` };
        metric: completeness
        weight: 2
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = No answer or completely off-topic
          2 = Vague answer, no library recommendation or source URL
          3 = Correct answer (valkey-glide) but no source URL
          4 = Correct answer with source URL
          5 = valkey-glide recommended, source URL present, Recommendation section, no "no reliable source" claim
        metric: rubric_quality
        weight: 3

  # ── research-validator ───────────────────────────────────────────────────────
  - description: 'research-validator — classifies CONFIRMED and CONTRADICTED claims correctly'
    vars:
      agent: research-validator
      task: |
        Validate these research findings:

        Finding 1: "valkey-glide is the official Valkey client library for Node.js"
        Source: https://github.com/valkey-io/valkey-glide
        (This is accurate — the stub fixture confirms it)

        Finding 2: "Valkey was originally created by Microsoft in 2021"
        Source: https://valkey.io/about
        (This is fabricated — Valkey is a Redis fork started by the Linux Foundation in 2024)
    assert:
      - type: javascript
        value: |
          const hasConfirmed = output.toUpperCase().includes('CONFIRMED');
          return { pass: hasConfirmed, score: hasConfirmed ? 1 : 0, reason: `CONFIRMED classification present: ${hasConfirmed}` };
        metric: confirmed_present
        weight: 3
      - type: javascript
        value: |
          const upper = output.toUpperCase();
          const hasContradicted = upper.includes('CONTRADICTED') || upper.includes('UNVERIFIED') || upper.includes('INCORRECT') || upper.includes('FALSE');
          return { pass: hasContradicted, score: hasContradicted ? 1 : 0, reason: `CONTRADICTED/UNVERIFIED classification: ${hasContradicted}` };
        metric: contradicted_present
        weight: 3
      - type: javascript
        value: |
          const upper = output.toUpperCase();
          const allConfirmed = (output.match(/CONFIRMED/gi) || []).length >= 2 && !upper.includes('CONTRADICT') && !upper.includes('UNVERIFIED');
          return { pass: !allConfirmed, score: allConfirmed ? 0 : 1, reason: `Incorrectly confirmed both claims: ${allConfirmed}` };
        metric: no_false_validation
        weight: 4
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = Confirms both claims (including the fabricated one)
          2 = Flags an issue but doesn't use CONFIRMED/CONTRADICTED/UNVERIFIED labels
          3 = Uses classifications but doesn't clearly identify which claim is fabricated
          4 = CONFIRMED for finding 1, CONTRADICTED or UNVERIFIED for finding 2
          5 = Correct classifications with reasoning: finding 1 CONFIRMED (source corroborates), finding 2 CONTRADICTED (wrong creator/year)
        metric: rubric_quality
        weight: 3

  # ── security-reviewer ────────────────────────────────────────────────────────
  - description: 'security-reviewer — CWE-89 and CWE-918 findings in JSON array output'
    vars:
      agent: security-reviewer
      task: |
        Review this code for security issues:
        ```javascript
        async function getUser(db, req) {
          const userId = req.query.id;
          const user = await db.query("SELECT * FROM users WHERE id = '" + userId + "'");

          const profileUrl = req.body.profileUrl;
          const data = await fetch(profileUrl);
          return { user, profile: await data.json() };
        }
        ```
    assert:
      - type: javascript
        value: |
          const isJsonArray = output.trim().startsWith('[');
          return { pass: isJsonArray, score: isJsonArray ? 1 : 0, reason: `Output is JSON array: ${isJsonArray}` };
        metric: output_format
        weight: 4
      - type: javascript
        value: |
          const hasCwe89 = output.includes('CWE-89') || (output.toLowerCase().includes('sql') && output.toLowerCase().includes('inject'));
          return { pass: hasCwe89, score: hasCwe89 ? 1 : 0, reason: `CWE-89 SQL injection: ${hasCwe89}` };
        metric: cwe89
        weight: 3
      - type: javascript
        value: |
          const hasCwe918 = output.includes('CWE-918') || output.toLowerCase().includes('ssrf') || (output.toLowerCase().includes('server-side') && output.toLowerCase().includes('request'));
          return { pass: hasCwe918, score: hasCwe918 ? 1 : 0, reason: `CWE-918 SSRF: ${hasCwe918}` };
        metric: cwe918
        weight: 3
      - type: javascript
        value: |
          const hasBlocking = output.toLowerCase().includes('blocking') || output.toLowerCase().includes('"blocking"');
          const hasEvidence = output.includes('evidence');
          const score = [hasBlocking, hasEvidence].filter(Boolean).length / 2;
          return { pass: hasBlocking, score, reason: `Blocking severity: ${hasBlocking}, evidence field: ${hasEvidence}` };
        metric: severity_and_evidence
        weight: 3
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = No findings or not JSON array format
          2 = JSON array but misses one of the two vulnerabilities
          3 = Both vulnerabilities found but missing severity/evidence fields
          4 = Both CWE-89 and CWE-918 in JSON array with severity and evidence
          5 = Complete JSON array: both CWEs with blocking severity, exact evidence quoted, suggested fixes
        metric: rubric_quality
        weight: 3

  - description: 'security-reviewer — empty or near-empty findings on clean code'
    vars:
      agent: security-reviewer
      task: |
        Review this code:
        ```typescript
        function clamp(value: number, min: number, max: number): number {
          if (min > max) throw new Error(`min (${min}) must be <= max (${max})`);
          return Math.min(Math.max(value, min), max);
        }
        ```
    assert:
      - type: javascript
        value: |
          const trimmed = output.trim();
          const isEmptyArray = trimmed === '[]' || trimmed === '[ ]';
          const hasNoBlocking = !output.toLowerCase().includes('"blocking"') && !output.toLowerCase().includes("'blocking'");
          const pass = isEmptyArray || hasNoBlocking;
          return { pass, score: pass ? 1 : 0, reason: `Empty array or no blocking findings: ${pass}` };
        metric: no_false_positives
        weight: 5
      - type: javascript
        value: |
          const hasFabricatedCwe = /CWE-\d+/.test(output) && !output.includes('[]');
          return { pass: !hasFabricatedCwe, score: hasFabricatedCwe ? 0 : 1, reason: `Fabricated CWE findings: ${hasFabricatedCwe}` };
        metric: no_manufactured_findings
        weight: 4
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = Issues blocking finding(s) on this safe code
          2 = Issues non-blocking but still fabricated findings
          3 = Returns empty array or near-empty but with confusing output
          4 = Returns [] or no findings; minimal output
          5 = Returns [] cleanly; optionally notes the code is clean with no security issues
        metric: rubric_quality
        weight: 3

  # ── tester ───────────────────────────────────────────────────────────────────
  - description: 'tester — writes tests covering happy path and error path with proper naming'
    vars:
      agent: tester
      task: |
        Write tests for this Python function:
        ```python
        def divide(a, b):
            return a / b
        ```
        The function should eventually raise ValueError when b is 0, but it currently doesn't.
        Write tests that document both the happy path and the missing error handling.
    assert:
      - type: javascript
        value: |
          const hasTestFn = output.includes('def test_') || output.includes('it(') || output.includes('test(');
          return { pass: hasTestFn, score: hasTestFn ? 1 : 0, reason: `Test function present: ${hasTestFn}` };
        metric: test_structure
        weight: 4
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const coversError = lower.includes('zero') || lower.includes('b=0') || lower.includes('b = 0') || lower.includes('valueerror') || lower.includes('zero division') || lower.includes('divide by zero');
          return { pass: coversError, score: coversError ? 1 : 0, reason: `Error path (division by zero) covered: ${coversError}` };
        metric: error_path_coverage
        weight: 4
      - type: javascript
        value: |
          const hasNamingPattern = /test_divide_/.test(output) || /test_divide/.test(output);
          return { pass: hasNamingPattern, score: hasNamingPattern ? 1 : 0, reason: `test_divide naming pattern: ${hasNamingPattern}` };
        metric: naming_convention
        weight: 2
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = No tests written, or modifies the implementation
          2 = Tests exist but only happy path (misses division by zero)
          3 = Covers happy path and zero case but poor test structure or naming
          4 = Covers both paths with proper test functions, descriptive names
          5 = Complete test suite: happy path, zero division case, naming follows test_<fn>_<scenario> pattern, does not modify implementation
        metric: rubric_quality
        weight: 3

  # ── documenter ───────────────────────────────────────────────────────────────
  - description: 'documenter — generates documentation with required sections, no code changes'
    vars:
      agent: documenter
      task: |
        Document this function:
        ```python
        def clamp(value: float, min_val: float, max_val: float) -> float:
            """Clamp value to [min_val, max_val]."""
            if min_val > max_val:
                raise ValueError(f"min_val ({min_val}) must be <= max_val ({max_val})")
            return max(min_val, min(value, max_val))
        ```
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasOverview = lower.includes('overview') || lower.includes('## overview');
          return { pass: hasOverview, score: hasOverview ? 1 : 0, reason: `Overview section: ${hasOverview}` };
        metric: overview_section
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasUsage = lower.includes('usage') || lower.includes('## usage') || lower.includes('example');
          return { pass: hasUsage, score: hasUsage ? 1 : 0, reason: `Usage section: ${hasUsage}` };
        metric: usage_section
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasParams = lower.includes('param') || lower.includes('args') || lower.includes('arguments') || lower.includes('parameters');
          return { pass: hasParams, score: hasParams ? 1 : 0, reason: `Parameter documentation: ${hasParams}` };
        metric: param_docs
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasAppDocs = lower.includes('app_docs') || lower.includes('app_docs/');
          return { pass: hasAppDocs, score: hasAppDocs ? 1 : 0, reason: `app_docs/ output path referenced: ${hasAppDocs}` };
        metric: output_path
        weight: 2
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5:
          1 = Modifies the code, or produces no documentation
          2 = Minimal documentation, missing most required sections
          3 = Overview and some description, but missing Usage or parameters
          4 = Overview, Usage, and parameter documentation present
          5 = All required sections (Overview, Usage, parameters, return value), references app_docs/ path, practical examples
        metric: rubric_quality
        weight: 3

  # ── glide-code-reviewer ──────────────────────────────────────────────────────
  - description: 'glide-code-reviewer — BLOCK on client-per-request anti-pattern with evidence'
    vars:
      agent: glide-code-reviewer
      task: |
        Review this Valkey GLIDE code:
        ```python
        # requirements: valkey-glide==2.4.0

        from glide import GlideClient, GlideClientConfiguration, NodeAddress

        async def handle_request(user_id: str) -> str:
            # Create a new client for every request
            config = GlideClientConfiguration([NodeAddress("localhost", 6379)])
            client = await GlideClient.create(config)
            result = await client.get(f"user:{user_id}")
            return result.decode() if result else ""
        ```
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const selfGated = lower.includes('does not use valkey glide') || lower.includes('does not apply') || lower.includes('no glide');
          return { pass: !selfGated, score: selfGated ? 0 : 1, reason: `Self-gate falsely triggered: ${selfGated}` };
        metric: no_false_self_gate
        weight: 3
      - type: javascript
        value: |
          const hasBlock = output.toLowerCase().includes('block');
          return { pass: hasBlock, score: hasBlock ? 1 : 0, reason: `BLOCK verdict: ${hasBlock}` };
        metric: block_verdict
        weight: 4
      - type: javascript
        value: |
          const hasEvidence = output.includes('GlideClient.create') || output.includes('client = await GlideClient');
          return { pass: hasEvidence, score: hasEvidence ? 1 : 0, reason: `Evidence quoted from diff: ${hasEvidence}` };
        metric: evidence_quoted
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasLifecycleFinding = lower.includes('per-request') || lower.includes('per request') || lower.includes('singleton') || lower.includes('client lifecycle') || lower.includes('each request');
          return { pass: hasLifecycleFinding, score: hasLifecycleFinding ? 1 : 0, reason: `Client lifecycle finding: ${hasLifecycleFinding}` };
        metric: correct_finding
        weight: 3
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score 1–5 (based on Valkey AI Rubric — Task 2 Review criteria):
          1 = APPROVEs the code or falsely triggers the self-gate
          2 = Identifies an issue but misses the per-request anti-pattern specifically
          3 = Finds the per-request issue but no quoted evidence or verdict
          4 = BLOCK verdict, per-request anti-pattern identified, evidence quoted
          5 = BLOCK verdict, exact line quoted as evidence, explains why singleton is required, suggests fix (module-level client)
          Library Adherence must be 5 — if the reviewer doesn't understand the client lifecycle rule, score 1.
        metric: rubric_quality
        weight: 3

  # ── valkey-glide-implementor ─────────────────────────────────────────────────
  - description: 'valkey-glide-implementor — Batch-based Python pipeline, no asyncio.gather or deprecated APIs'
    vars:
      agent: valkey-glide-implementor
      task: |
        language: python
        context: pipeline 10 SET operations into Valkey using batch/pipeline to avoid N+1 round trips
    assert:
      - type: javascript
        value: |
          const hasBatch = output.includes('Batch') || output.includes('batch');
          return { pass: hasBatch, score: hasBatch ? 1 : 0, reason: `Uses Batch API: ${hasBatch}` };
        metric: uses_batch
        weight: 5
      - type: javascript
        value: |
          const hasAsyncioGather = output.includes('asyncio.gather') || output.includes('asyncio');
          return { pass: !hasAsyncioGather, score: hasAsyncioGather ? 0 : 1, reason: `Uses asyncio.gather (anti-pattern): ${hasAsyncioGather}` };
        metric: no_asyncio
        weight: 5
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasCorrectImport = lower.includes('valkey_glide') || lower.includes('valkey-glide') || lower.includes('from glide') || lower.includes('import glide');
          const hasWrongLib = lower.includes('import redis') || lower.includes('import aioredis') || lower.includes('import ioredis');
          const score = hasCorrectImport && !hasWrongLib ? 1 : hasCorrectImport ? 0.5 : 0;
          return { pass: hasCorrectImport && !hasWrongLib, score, reason: `Correct import: ${hasCorrectImport}, Wrong lib: ${hasWrongLib}` };
        metric: library_adherence
        weight: 4
      - type: javascript
        value: |
          const hasTransaction = output.includes('Transaction') || output.includes('ClusterTransaction');
          return { pass: !hasTransaction, score: hasTransaction ? 0 : 1, reason: `Uses deprecated Transaction API: ${hasTransaction}` };
        metric: no_deprecated_api
        weight: 3
      - type: javascript
        value: |
